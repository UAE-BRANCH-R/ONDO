
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b0f;--bg2:#0d1117;--bg3:#131920;

<script>
const PRICE_MIN = 0.049, PRICE_MAX = 0.093;
const PRICE_MID = (PRICE_MIN + PRICE_MAX) / 2;
const SLOT = 60, HISTORY = 60;

function loadState() {
  try {
    const s = localStorage.getItem('ondo2_state_v3');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { holdings: 207, orders: [] };
}
function saveState(st) {
  try { localStorage.setItem('ondo2_state_v3', JSON.stringify(st)); } catch(e) {}
}

let state = loadState();

function makePRNG(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function computeLivePrice() {
  const nowSec = Math.floor(Date.now() / 1000);
  const rng = makePRNG((nowSec * 2654435761) >>> 0);
  const wave1 = Math.sin(nowSec / 120) * 0.012;
  const wave2 = Math.sin(nowSec / 47 + 1.3) * 0.006;
  const noise = (rng() - 0.5) * 0.008;
  const raw = PRICE_MID + wave1 + wave2 + noise;
  return Math.max(PRICE_MIN + 0.001, Math.min(PRICE_MAX - 0.001, raw));
}

let candleData = [];

function getMinuteSlot(s) { return Math.floor(s / SLOT) * SLOT; }

function buildSealedCandle(slotT) {
  const rng = makePRNG((slotT ^ 0xDEADBEEF) >>> 0);
  const wave = Math.sin(slotT / 300) * 0.015 + Math.sin(slotT / 83 + 0.7) * 0.007;
  const slotBase = Math.max(PRICE_MIN+0.002, Math.min(PRICE_MAX-0.002, PRICE_MID + wave + (rng()-0.5)*0.010));
  const dir = rng() > 0.42 ? 1 : -1, body = rng() * 0.007;
  const o = slotBase, c = Math.max(PRICE_MIN+0.001, Math.min(PRICE_MAX-0.001, o + dir * body));
  const h = Math.min(PRICE_MAX, Math.max(o,c) + rng()*0.004);
  const l = Math.max(PRICE_MIN, Math.min(o,c) - rng()*0.003);
  return {t: slotT, o, h, l, c, sealed: true};
}

function seedCandles() {
  candleData = [];
  const nowSec = Math.floor(Date.now() / 1000);
  const curSlot = getMinuteSlot(nowSec);
  for (let i = HISTORY; i >= 1; i--)
    candleData.push(buildSealedCandle(curSlot - i * SLOT));
  const lastClose = candleData.length ? candleData[candleData.length-1].c : PRICE_MID;
  candleData.push({t: curSlot, o: lastClose, h: lastClose, l: lastClose, c: lastClose, sealed: false});
}

function advanceCandles(lp) {
  if (!candleData.length) return;
  const nowSec = Math.floor(Date.now() / 1000);
  const curSlot = getMinuteSlot(nowSec);
  const last = candleData[candleData.length - 1];
  if (curSlot > last.t) {
    last.sealed = true;
    candleData.push({t: curSlot, o: last.c, h: lp, l: lp, c: lp, sealed: false});
    if (candleData.length > HISTORY + 2) candleData.shift();
  } else {
    last.c = lp;
    if (lp > last.h) last.h = lp;
    if (lp < last.l) last.l = lp;
  }
}

function drawChart(lp) {
  const canvas = document.getElementById('cc');
  const cw = document.getElementById('cw');
  const W = cw.offsetWidth || 360, H = Math.round(W * 0.62);
  canvas.width = W; canvas.height = H; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (candleData.length < 2) return;
  const pL=50, pR=56, pT=14, pB=28;
  const cW2=W-pL-pR, cH2=H-pT-pB;
  const prices = candleData.flatMap(c=>[c.h,c.l]);
  let minP=Math.min(...prices,lp), maxP=Math.max(...prices,lp);
  const pad=(maxP-minP)*0.1; minP-=pad; maxP+=pad;
  const pRng=maxP-minP, toY=p=>pT+(1-(p-minP)/pRng)*cH2;
  const n=candleData.length, slotW=cW2/n, bW=Math.max(1.5,slotW*0.72);
  ctx.lineWidth=0.5;
  for (let i=0;i<=5;i++) {
    const y=pT+(cH2/5)*i, pv=maxP-(pRng/5)*i;
    ctx.strokeStyle='#151e2a'; ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cW2,y); ctx.stroke();
    ctx.fillStyle='#3a5570'; ctx.font='9px Share Tech Mono,monospace'; ctx.textAlign='right';
    ctx.fillText('$'+pv.toFixed(3),pL-3,y+3);
  }
  const step=Math.max(1,Math.floor(n/5));
  for (let i=0;i<n;i+=step) {
    const x=pL+i*slotW+slotW/2, d=new Date(candleData[i].t*1000);
    const lbl=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    ctx.fillStyle='#3a5570'; ctx.font='8px Share Tech Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(lbl,x,pT+cH2+16);
  }
  if (n>=7) {
    const ma7=[];
    for (let i=6;i<n;i++) ma7.push({x:pL+(i+0.5)*slotW,y:toY(candleData.slice(i-6,i+1).reduce((s,c)=>s+c.c,0)/7)});
    ctx.strokeStyle='rgba(255,214,0,0.45)'; ctx.lineWidth=1;
    ctx.beginPath(); ma7.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
  }
  candleData.forEach((c,i)=>{
    const x=pL+i*slotW+slotW/2, isUp=c.c>=c.o, col=isUp?'#00e676':'#ff3d57';
    const bodyT=toY(Math.max(c.o,c.c)), bodyB=toY(Math.min(c.o,c.c)), bH=Math.max(1,bodyB-bodyT);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,toY(c.h)); ctx.lineTo(x,toY(c.l)); ctx.stroke();
    ctx.fillStyle=!c.sealed?(isUp?'#00ff99':'#ff6080'):(isUp?'#00e676':'rgba(255,61,87,0.18)');
    ctx.strokeStyle=!c.sealed?(isUp?'#00ff99':'#ff6080'):col;
    ctx.fillRect(x-bW/2,bodyT,bW,bH); ctx.strokeRect(x-bW/2,bodyT,bW,bH);
  });
  if (lp) {
    const ly=toY(lp);
    ctx.setLineDash([3,4]); ctx.strokeStyle='rgba(0,230,118,0.55)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pL,ly); ctx.lineTo(pL+cW2,ly); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#00e676';
    ctx.fillRect(pL+cW2+1,ly-8,pR-3,16);
    ctx.fillStyle='#050f09'; ctx.font='bold 9px Share Tech Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('$'+lp.toFixed(3),pL+cW2+1+(pR-3)/2,ly+3);
  }
  ctx.fillStyle='rgba(33,150,243,0.7)'; ctx.fillRect(pL+2,pT+2,22,14);
  ctx.fillStyle='#fff'; ctx.font='bold 9px Share Tech Mono,monospace'; ctx.textAlign='center';
  ctx.fillText('1m',pL+13,pT+11);
}

function updateOB(mid) {
  const rowsS=[], rowsB=[];
  const rng=makePRNG((Math.floor(Date.now()/3000)*1234567)>>>0);
  for (let i=6;i>=1;i--) { const off=i*(0.001+rng()*0.002),sz=Math.floor(rng()*8000+500); rowsS.push({p:(mid+off).toFixed(4),sz:sz.toLocaleString(),w:Math.round(sz/8500*100)}); }
  for (let i=1;i<=6;i++) { const off=i*(0.001+rng()*0.002),sz=Math.floor(rng()*8000+500); rowsB.push({p:(mid-off).toFixed(4),sz:sz.toLocaleString(),w:Math.round(sz/8500*100)}); }
  document.getElementById('ob-s').innerHTML=rowsS.map(r=>`<div class="ob-r s"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`).join('');
  document.getElementById('ob-b').innerHTML=rowsB.map(r=>`<div class="ob-r b"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`).join('');
}

function renderOrders() {
  const el = document.getElementById('orders-list');
  if (!state.orders.length) { el.innerHTML='<div class="no-orders">No orders yet</div>'; return; }
  const sorted = [...state.orders].reverse();
  el.innerHTML = sorted.map(o => {
    const now = Date.now();
    let statusClass, statusText, timerText='';
    if (o.status === 'processing') {
      const elapsed = now - o.createdAt;
      const remaining = Math.max(0, 3600000 - elapsed);
      if (remaining <= 0) { o.status = 'pending'; saveState(state); }
      else {
        const m = Math.floor(remaining/60000), s = Math.floor((remaining%60000)/1000);
        timerText = m+'m '+s+'s remaining';
      }
    }
    if (o.status === 'pending') {
      const elapsed = now - o.createdAt;
      const remaining = Math.max(0, 7200000 - elapsed);
      if (remaining <= 0) { o.status = 'success'; saveState(state); }
      else {
        const m = Math.floor(remaining/60000), s = Math.floor((remaining%60000)/1000);
        timerText = m+'m '+s+'s to complete';
      }
    }
    if (o.status === 'processing') { statusClass='processing'; statusText='PROCESSING'; }
    else if (o.status === 'pending') { statusClass='pending'; statusText='PENDING'; }
    else { statusClass='success'; statusText='SUCCESS'; timerText='Completed'; }
    return `<div class="order-row">
      <div class="or-top">
        <div class="or-id">ORDER #${o.id}</div>
        <div class="or-status ${statusClass}">${statusText}</div>
      </div>
      <div class="or-info">
        <div class="or-amount">${o.qty.toFixed(4)} ONDO 2 → $${o.value.toFixed(4)}</div>
        <div class="or-price">@ $${o.price.toFixed(4)}</div>
      </div>
      <div class="or-timer">${timerText}</div>
    </div>`;
  }).join('');
}

let prevPrice = null;

function updateUI(lp) {
  const p = lp, fmt = p.toFixed(4);
  const isUp = prevPrice === null ? true : p >= prevPrice;
  const tb = document.getElementById('tb-p');
  tb.textContent='$'+fmt; tb.className='tb-price '+(isUp?'up':'dn');
  setTimeout(()=>tb.className='tb-price',200);
  document.getElementById('st-p').textContent='$'+fmt;
  const ref = PRICE_MID;
  const chg = p - ref, pct = (chg/ref*100).toFixed(2);
  document.getElementById('tb-chg').textContent=(chg>=0?'▲ +':'▼ ')+'$'+Math.abs(chg).toFixed(4)+' ('+pct+'%)';
  document.getElementById('tb-chg').style.color=chg>=0?'#00e676':'#ff3d57';
  document.getElementById('st-c').textContent=(chg>=0?'+':'')+pct+'%';
  document.getElementById('st-c').style.color=chg>=0?'#00e676':'#ff3d57';
  document.getElementById('tb-hi').textContent='$'+PRICE_MAX.toFixed(3);
  document.getElementById('tb-lo').textContent='$'+PRICE_MIN.toFixed(3);
  const h = state.holdings;
  document.getElementById('bc-holdings').textContent=h.toFixed(4)+' ONDO 2';
  const balEl = document.getElementById('b-usd');
  balEl.textContent='$'+(h*p).toLocaleString('en-US',{minimumFractionDigits:4,maximumFractionDigits:4});
  balEl.className='bc-total pulse';
  setTimeout(()=>balEl.className='bc-total',300);
  document.getElementById('b-sub').textContent='@ $'+fmt+' per ONDO 2';
  document.getElementById('ob-m').textContent='$'+p.toFixed(4);
  document.getElementById('ob-m').style.color=isUp?'#00e676':'#ff3d57';
  document.getElementById('cur-serial').textContent=572+Math.floor((Date.now()-new Date('2026-06-08T00:00:00Z').getTime())/86400000)*89;
  document.getElementById('sp-avail').textContent=h.toFixed(4)+' ONDO 2';
  document.getElementById('sp-price').textContent='$'+fmt;
  const qty = parseFloat(document.getElementById('sell-qty').value)||0;
  document.getElementById('sp-est').textContent='$'+(qty*p).toFixed(4);
  updateOB(p);
  renderOrders();
  prevPrice = lp;
}

document.getElementById('sell-qty').addEventListener('input', () => {
  const lp = computeLivePrice();
  const qty = parseFloat(document.getElementById('sell-qty').value)||0;
  document.getElementById('sp-est').textContent='$'+(qty*lp).toFixed(4);
});

document.getElementById('btn-max').addEventListener('click', () => {
  document.getElementById('sell-qty').value = state.holdings.toFixed(4);
  const lp = computeLivePrice();
  document.getElementById('sp-est').textContent='$'+(state.holdings*lp).toFixed(4);
});

document.getElementById('btn-sell').addEventListener('click', () => {
  const qty = parseFloat(document.getElementById('sell-qty').value);
  if (!qty || qty <= 0) { alert('Enter a valid quantity'); return; }
  if (qty > state.holdings) { alert('Insufficient balance'); return; }
  const lp = computeLivePrice();
  const orderId = 'O'+Date.now().toString().slice(-6);
  const order = { id: orderId, qty, price: lp, value: qty*lp, createdAt: Date.now(), status: 'processing' };
  state.holdings -= qty;
  state.orders.push(order);
  saveState(state);
  document.getElementById('sell-qty').value = '';
  document.getElementById('sp-est').textContent='$0.0000';
  renderOrders();
  updateUI(lp);
});

seedCandles();
let lp = computeLivePrice();
updateUI(lp); drawChart(lp);

setInterval(() => {
  lp = computeLivePrice();
  advanceCandles(lp);
  updateUI(lp);
  drawChart(lp);
}, 1000);

window.addEventListener('resize', () => drawChart(computeLivePrice()));
</script>
