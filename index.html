
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

.ob-r.s .bg{background:var(--red)}.ob-r.b .bg{background:var(--green)}
.ob-r.s .p{color:var(--red)}.ob-r.b .p{color:var(--green)}

<script>
const HOLDINGS    = 207;
const START_PRICE = 8.412;
const DAILY_DROP  = 1.00;
const DAY_ZERO    = new Date('2026-06-08T00:00:00Z');

// ── Seeded PRNG (mulberry32) ──
function makePRNG(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function tfHash(tf) {
  let h = 0;
  for (let i = 0; i < tf.length; i++) h = (Math.imul(31, h) + tf.charCodeAt(i)) | 0;
  return h;
}

// ── Time-based helpers ──
function getDayNum() {
  return Math.max(0, Math.floor((Date.now() - DAY_ZERO.getTime()) / 86400000));
}
function getDayPrice(d) {
  return Math.max(0.01, START_PRICE - d * DAILY_DROP);
}

// ── Deterministic live price using wall clock seconds ──
// Even if tab is closed, re-opening calculates the CORRECT current price
function computeLivePrice(dayBase) {
  const nowSec = Math.floor(Date.now() / 1000);
  const rng = makePRNG((nowSec * 2654435761) >>> 0);
  const micro = (rng() - 0.5) * 0.06;
  return Math.max(0.01, dayBase + micro);
}

const tfSecs  = {'15m':900,'1h':3600,'4h':14400,'1d':86400};
const tfCount = {'15m':60,'1h':48,'4h':36,'1d':24};

let currentTF = '1h';
let candleData = [];

// ── Build ALL candles from wall-clock time deterministically ──
// Same input (day + tf + current time) → same candles, always
function seedCandles(tf) {
  candleData = [];
  const dayNum = getDayNum();
  const dayBase = getDayPrice(dayNum);
  const s   = tfSecs[tf];
  const cnt = tfCount[tf];

  const baseSeed = (dayNum * 1000 + Math.abs(tfHash(tf))) >>> 0;
  const rng = makePRNG(baseSeed);

  const dps = DAILY_DROP / (86400 / s);
  let p = dayBase + cnt * dps * 1.1;

  const now     = Math.floor(Date.now() / 1000);
  const slotNow = Math.floor(now / s) * s;

  for (let i = 0; i < cnt; i++) {
    const slotT = slotNow - (cnt - i) * s;
    const dir   = rng() > 0.45 ? -1 : 1;
    const body  = rng() * 0.1 * (s / 3600);
    const o = p;
    const c = Math.max(0.01, o + dir * body);
    const h = Math.max(o, c) + rng() * 0.04 * (s / 3600);
    const l = Math.min(o, c) - rng() * 0.04 * (s / 3600);

    // For slots already elapsed: use seeded candle
    // For current slot: will be patched below
    candleData.push({t: slotT, o, h, l, c, sealed: slotT < slotNow});
    p = c - dps * (0.8 + rng() * 0.4);
    if (p < 0.01) p = 0.01;
  }

  // Patch last candle to reflect current live price
  if (candleData.length) {
    const last = candleData[candleData.length - 1];
    const lp = computeLivePrice(dayBase);
    last.c = lp;
    last.h = Math.max(last.o, lp) + 0.015;
    last.l = Math.min(last.o, lp) - 0.015;
  }
}

// ── Advance candles: add new slot when time moves forward ──
function advanceCandles(livePrice) {
  if (!candleData.length) return;
  const s = tfSecs[currentTF];
  const now = Math.floor(Date.now() / 1000);
  const last = candleData[candleData.length - 1];
  const currentSlot = Math.floor(now / s) * s;

  if (currentSlot > last.t) {
    // New slot opened — seal last, open new
    last.sealed = true;
    candleData.push({t: currentSlot, o: last.c, h: livePrice, l: livePrice, c: livePrice, sealed: false});
    if (candleData.length > 80) candleData.shift();
  } else {
    // Update current live candle
    last.c = livePrice;
    if (livePrice > last.h) last.h = livePrice;
    if (livePrice < last.l) last.l = livePrice;
  }
}

function drawChart(livePrice) {
  const canvas = document.getElementById('cc');
  const cw     = document.getElementById('cw');
  const W = cw.offsetWidth || 360;
  const H = Math.round(W * 0.58);
  canvas.width = W; canvas.height = H; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (candleData.length < 2) return;

  const pL=46, pR=54, pT=12, pB=24;
  const cW2 = W-pL-pR, cH2 = H-pT-pB;
  const prices = candleData.flatMap(c => [c.h, c.l]);
  let minP = Math.min(...prices), maxP = Math.max(...prices);
  const rng2 = maxP - minP, pad = rng2 * 0.1;
  minP -= pad; maxP += pad;
  const pRng = maxP - minP;
  const toY  = p => pT + (1 - (p - minP) / pRng) * cH2;
  const n    = candleData.length;
  const slotW = cW2 / n;
  const bW    = Math.max(1.5, slotW * 0.7);

  ctx.strokeStyle = '#151e2a'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y  = pT + (cH2 / 4) * i;
    const pv = maxP - (pRng / 4) * i;
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(pL+cW2, y); ctx.stroke();
    ctx.fillStyle = '#3a5570'; ctx.font = '9px Share Tech Mono,monospace';
    ctx.textAlign = 'right'; ctx.fillText('$'+pv.toFixed(2), pL-3, y+3);
  }
  const step = Math.max(1, Math.floor(n / 5));
  for (let i = 0; i < n; i += step) {
    const x = pL + i*slotW + slotW/2;
    const d = new Date(candleData[i].t * 1000);
    const lbl = currentTF === '1d'
      ? (d.getMonth()+1)+'/'+d.getDate()
      : d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    ctx.fillStyle = '#3a5570'; ctx.font = '8px Share Tech Mono,monospace';
    ctx.textAlign = 'center'; ctx.fillText(lbl, x, pT+cH2+14);
  }

  if (n >= 7) {
    const ma7 = [];
    for (let i = 6; i < n; i++)
      ma7.push({x: pL+(i+0.5)*slotW, y: toY(candleData.slice(i-6,i+1).reduce((s,c)=>s+c.c,0)/7)});
    ctx.strokeStyle = 'rgba(255,214,0,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ma7.forEach((p,i) => i ? ctx.lineTo(p.x,p.y) : ctx.moveTo(p.x,p.y)); ctx.stroke();
  }

  candleData.forEach((c, i) => {
    const x    = pL + i*slotW + slotW/2;
    const isUp = c.c >= c.o;
    const col  = isUp ? '#00e676' : '#ff3d57';
    const bodyT = toY(Math.max(c.o, c.c));
    const bodyB = toY(Math.min(c.o, c.c));
    const bH    = Math.max(1, bodyB - bodyT);
    ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, toY(c.h)); ctx.lineTo(x, toY(c.l)); ctx.stroke();
    ctx.fillStyle = isUp ? '#00e676' : 'rgba(255,61,87,0.2)';
    ctx.fillRect(x-bW/2, bodyT, bW, bH);
    ctx.strokeRect(x-bW/2, bodyT, bW, bH);
  });

  if (livePrice) {
    const ly = toY(livePrice);
    ctx.setLineDash([3,4]); ctx.strokeStyle = 'rgba(0,230,118,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pL,ly); ctx.lineTo(pL+cW2,ly); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#00e676';
    ctx.fillRect(pL+cW2+1, ly-8, pR-3, 16);
    ctx.fillStyle = '#050f09'; ctx.font = 'bold 9px Share Tech Mono,monospace'; ctx.textAlign = 'center';
    ctx.fillText('$'+livePrice.toFixed(2), pL+cW2+1+(pR-3)/2, ly+3);
  }
}

function updateOB(mid) {
  const rowsS=[], rowsB=[];
  const obSeed = Math.floor(Date.now() / 3000);
  const rng = makePRNG((obSeed * 1234567) >>> 0);
  for (let i=6; i>=1; i--) {
    const off = i*(0.003+rng()*0.005);
    const sz  = Math.floor(rng()*8000+500);
    rowsS.push({p:(mid+off).toFixed(3), sz:sz.toLocaleString(), w:Math.round(sz/8500*100)});
  }
  for (let i=1; i<=6; i++) {
    const off = i*(0.003+rng()*0.005);
    const sz  = Math.floor(rng()*8000+500);
    rowsB.push({p:(mid-off).toFixed(3), sz:sz.toLocaleString(), w:Math.round(sz/8500*100)});
  }
  document.getElementById('ob-s').innerHTML = rowsS.map(r=>`<div class="ob-r s"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`).join('');
  document.getElementById('ob-b').innerHTML = rowsB.map(r=>`<div class="ob-r b"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`).join('');
}

function updateUI(livePrice, prevPrice) {
  const dayNum = getDayNum();
  const p = livePrice, fmt = p.toFixed(2);
  const isUp = p >= prevPrice;

  const tb = document.getElementById('tb-p');
  tb.textContent = '$'+fmt;
  tb.className = 'tb-price '+(isUp?'up':'dn');
  setTimeout(() => tb.className = 'tb-price', 200);
  document.getElementById('st-p').textContent = '$'+fmt;

  const yestPrice = getDayPrice(Math.max(0, dayNum-1));
  const chg = p - yestPrice, pct = (chg/yestPrice*100).toFixed(2);
  document.getElementById('tb-chg').textContent = (chg>=0?'▲ +':'▼ ')+'$'+Math.abs(chg).toFixed(2)+' ('+pct+'%)';
  document.getElementById('tb-chg').style.color = chg>=0?'#00e676':'#ff3d57';
  document.getElementById('st-c').textContent = (chg>=0?'+':'')+pct+'%';
  document.getElementById('st-c').style.color  = chg>=0?'#00e676':'#ff3d57';
  document.getElementById('tb-hi').textContent = '$'+(p+0.45).toFixed(2);
  document.getElementById('tb-lo').textContent = '$'+Math.max(0.01,p-0.22).toFixed(2);

  const total = HOLDINGS * p;
  const balEl = document.getElementById('b-usd');
  balEl.textContent = '$'+total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  balEl.className = 'bc-total pulse';
  setTimeout(() => balEl.className = 'bc-total', 300);
  document.getElementById('b-sub').textContent = '@ $'+fmt+' per ONDO 2';
  document.getElementById('ob-m').textContent  = '$'+p.toFixed(4);
  document.getElementById('ob-m').style.color  = isUp?'#00e676':'#ff3d57';

  // Serial: day 0 → 315, each day +89
  document.getElementById('cur-serial').textContent = 357 + dayNum * 89;

  updateOB(p);
}

window.switchTF = function(tf, btn) {
  currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  seedCandles(tf);
  const dayBase = getDayPrice(getDayNum());
  const lp = computeLivePrice(dayBase);
  drawChart(lp);
};

// ── Main loop ──
let prevPrice = null;

function tick() {
  const dayNum  = getDayNum();
  const dayBase = getDayPrice(dayNum);
  const lp      = computeLivePrice(dayBase);

  if (prevPrice === null) prevPrice = lp;

  advanceCandles(lp);
  updateUI(lp, prevPrice);
  drawChart(lp);

  prevPrice = lp;
}

// Init
seedCandles('1h');
tick();
setInterval(tick, 1000);
window.addEventListener('resize', () => {
  const dayBase = getDayPrice(getDayNum());
  drawChart(computeLivePrice(dayBase));
});
</script>
