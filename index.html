
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b0f;--bg2:#0d1117;--bg3:#131920;
  --border:#1a2840;--border2:#253650;
  --green:#00e676;--red:#ff3d57;--blue:#2196f3;--gold:#ffd600;
  --blue-dim:#0a1828;
  --text:#dce8f5;--text2:#7a96b2;--text3:#3a5570;

}
html,body{background:var(--bg);color:var(--text);font-family:var(--ui);width:100%;overflow-x:hidden}

.sc2-blk{display:flex;flex-direction:column;gap:3px}

.sc2-div{width:1px;height:50px;background:var(--border)}
.ob-card{background:var(--bg2);margin:0 12px 12px;border-radius:6px;border:1px solid var(--border);overflow:hidden}
.ob-hdr{padding:7px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;display:flex;justify-content:space-between}
.ob-cols{display:flex}
.ob-col{flex:1;overflow:hidden}
.ob-col:first-child{border-right:1px solid var(--border)}
.ob-col-hdr{padding:4px 8px;font-size:9px;color:var(--text3);font-family:var(--mono);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.ob-r{display:flex;justify-content:space-between;padding:2px 8px;font-family:var(--mono);font-size:10px;position:relative}
.ob-r .bg{position:absolute;top:0;right:0;height:100%;opacity:0.12;border-radius:1px}
.ob-r.s .bg{background:var(--red)}.ob-r.b .bg{background:var(--green)}
.ob-r.s .p{color:var(--red)}.ob-r.b .p{color:var(--green)}
.ob-r .sz{color:var(--text3);font-size:9px}

<div class="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-pair">ONDO 2 / USDT</div>
      <div class="tb-price" id="tb-p">—</div>

    </div>

      <div class="tb-stats">
        <div class="tb-stat"><div class="tb-slbl">HIGH</div><div class="tb-sval" id="tb-hi">—</div></div>
        <div class="tb-stat"><div class="tb-slbl">LOW</div><div class="tb-sval" id="tb-lo">—</div></div>

      </div>

  </div>

    <div class="stat-cell"><div class="sc-lbl">CHG</div><div class="sc-val" id="st-c">—</div></div>

  </div>

    </div>

        <div id="ob-s"></div>
      </div>
      <div class="ob-col">
        <div class="ob-col-hdr"><span>BUY</span><span>SIZE</span></div>
        <div id="ob-b"></div>
      </div>
    </div>
  </div>
</div>

<script>
const HOLDINGS    = 207;
const START_PRICE = 18.412;   // original price on DAY_ZERO
const DAILY_DROP  = 1.00;
const DAY_ZERO    = new Date('2026-06-08T00:00:00Z');

// ── Seeded PRNG (mulberry32) ──────────────────────────────────
function makePRNG(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Day helpers ───────────────────────────────────────────────
function getDayNum() {
  return Math.max(0, Math.floor((Date.now() - DAY_ZERO.getTime()) / 86400000));
}
function getDayPrice(d) {
  return Math.max(0.01, START_PRICE - d * DAILY_DROP);
}

// ── 1-minute candle store ─────────────────────────────────────
// We keep 60 sealed 1-min candles + 1 live candle = 61 total
// Each sealed candle is seeded by (minuteTimestamp) so it's
// identical across refreshes
const SLOT = 60;        // seconds per candle = 1 minute
const HISTORY = 60;     // how many past candles to show

function getMinuteSlot(unixSec) {
  return Math.floor(unixSec / SLOT) * SLOT;
}

// Build a deterministic candle for a given minute slot
// Price drifts gently around the day's base; buyer pump baked in
function buildSealedCandle(slotT, dayBase) {
  const rng = makePRNG((slotT ^ 0xDEADBEEF) >>> 0);

  // How many minutes ago is this slot?
  const nowSec = Math.floor(Date.now() / 1000);
  const minsAgo = (nowSec - slotT) / 60;

  // Base price for this slot: add a pump curve
  // Price was ~3 lower in the past, rises toward dayBase
  const pumpProgress = Math.max(0, Math.min(1, 1 - minsAgo / HISTORY));
  const dip = 3.0 * (1 - pumpProgress);   // 3 dollars lower at the start
  const slotBase = Math.max(0.01, dayBase - dip + (rng() - 0.5) * 0.15);

  const dir  = rng() > 0.42 ? 1 : -1;    // slight upward bias (buyer news)
  const body = rng() * 0.08;
  const o = slotBase;
  const c = Math.max(0.01, o + dir * body);
  const h = Math.max(o, c) + rng() * 0.04;
  const l = Math.min(o, c) - rng() * 0.03;
  return {t: slotT, o, h, l, c, sealed: true};
}

let candleData = [];

function seedCandles() {
  candleData = [];
  const dayNum  = getDayNum();
  const dayBase = getDayPrice(dayNum);
  const nowSec  = Math.floor(Date.now() / 1000);
  const curSlot = getMinuteSlot(nowSec);

  // Build HISTORY past candles (all sealed, deterministic)
  for (let i = HISTORY; i >= 1; i--) {
    const slotT = curSlot - i * SLOT;
    candleData.push(buildSealedCandle(slotT, dayBase));
  }

  // Add current live candle (open = last sealed close)
  const lastClose = candleData.length ? candleData[candleData.length-1].c : dayBase;
  candleData.push({t: curSlot, o: lastClose, h: lastClose, l: lastClose, c: lastClose, sealed: false});
}

// ── Compute live price (deterministic per second) ─────────────
function computeLivePrice(dayBase) {
  const nowSec = Math.floor(Date.now() / 1000);
  const rng = makePRNG((nowSec * 2654435761) >>> 0);
  return Math.max(0.01, dayBase + (rng() - 0.5) * 0.06);
}

// ── Advance: seal finished candle, open new one ───────────────
function advanceCandles(livePrice, dayBase) {
  if (!candleData.length) return;
  const nowSec  = Math.floor(Date.now() / 1000);
  const curSlot = getMinuteSlot(nowSec);
  const last    = candleData[candleData.length - 1];

  if (curSlot > last.t) {
    // Seal current candle
    last.sealed = true;
    // Open new live candle
    candleData.push({t: curSlot, o: last.c, h: livePrice, l: livePrice, c: livePrice, sealed: false});
    if (candleData.length > HISTORY + 2) candleData.shift();
  } else {
    // Update live candle
    last.c = livePrice;
    if (livePrice > last.h) last.h = livePrice;
    if (livePrice < last.l) last.l = livePrice;
  }
}

// ── Draw chart ────────────────────────────────────────────────
function drawChart(livePrice) {
  const canvas = document.getElementById('cc');
  const cw     = document.getElementById('cw');
  const W = cw.offsetWidth || 360;
  const H = Math.round(W * 0.62);
  canvas.width = W; canvas.height = H; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (candleData.length < 2) return;

  const pL=50, pR=56, pT=14, pB=28;
  const cW2 = W-pL-pR, cH2 = H-pT-pB;

  // Price range — include ALL candles so y-axis shows full history
  const prices = candleData.flatMap(c => [c.h, c.l]);
  let minP = Math.min(...prices), maxP = Math.max(...prices);
  const rng2 = maxP - minP;
  const pad  = rng2 * 0.08;
  minP -= pad; maxP += pad;
  const pRng = maxP - minP;
  const toY  = p => pT + (1 - (p - minP) / pRng) * cH2;

  const n     = candleData.length;
  const slotW = cW2 / n;
  const bW    = Math.max(1.5, slotW * 0.72);

  // ── Grid lines ──
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y  = pT + (cH2 / 5) * i;
    const pv = maxP - (pRng / 5) * i;
    ctx.strokeStyle = '#151e2a';
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(pL+cW2, y); ctx.stroke();
    ctx.fillStyle = '#3a5570'; ctx.font = '9px Share Tech Mono,monospace';
    ctx.textAlign = 'right';
    ctx.fillText('$'+pv.toFixed(2), pL-3, y+3);
  }

  // ── Time labels ──
  const step = Math.max(1, Math.floor(n / 5));
  for (let i = 0; i < n; i += step) {
    const x = pL + i*slotW + slotW/2;
    const d = new Date(candleData[i].t * 1000);
    const lbl = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    ctx.fillStyle = '#3a5570'; ctx.font = '8px Share Tech Mono,monospace';
    ctx.textAlign = 'center'; ctx.fillText(lbl, x, pT+cH2+16);
  }

  // ── MA7 ──
  if (n >= 7) {
    const ma7 = [];
    for (let i = 6; i < n; i++)
      ma7.push({x: pL+(i+0.5)*slotW, y: toY(candleData.slice(i-6,i+1).reduce((s,c)=>s+c.c,0)/7)});
    ctx.strokeStyle = 'rgba(255,214,0,0.45)'; ctx.lineWidth = 1;
    ctx.beginPath(); ma7.forEach((p,i) => i ? ctx.lineTo(p.x,p.y) : ctx.moveTo(p.x,p.y)); ctx.stroke();
  }

  // ── Candles ──
  candleData.forEach((c, i) => {
    const x    = pL + i*slotW + slotW/2;
    const isUp = c.c >= c.o;
    const col  = isUp ? '#00e676' : '#ff3d57';
    const bodyT = toY(Math.max(c.o, c.c));
    const bodyB = toY(Math.min(c.o, c.c));
    const bH    = Math.max(1, bodyB - bodyT);

    // Wick
    ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, toY(c.h)); ctx.lineTo(x, toY(c.l)); ctx.stroke();

    // Body — live candle slightly brighter
    if (!c.sealed) {
      ctx.fillStyle = isUp ? '#00ff99' : '#ff6080';
      ctx.strokeStyle = isUp ? '#00ff99' : '#ff6080';
    } else {
      ctx.fillStyle = isUp ? '#00e676' : 'rgba(255,61,87,0.18)';
      ctx.strokeStyle = col;
    }
    ctx.fillRect(x-bW/2, bodyT, bW, bH);
    ctx.strokeRect(x-bW/2, bodyT, bW, bH);
  });

  // ── Live price dashed line + label ──
  if (livePrice) {
    const ly = toY(livePrice);
    ctx.setLineDash([3,4]); ctx.strokeStyle = 'rgba(0,230,118,0.55)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pL,ly); ctx.lineTo(pL+cW2,ly); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#00e676';
    ctx.fillRect(pL+cW2+1, ly-8, pR-3, 16);
    ctx.fillStyle = '#050f09'; ctx.font = 'bold 9px Share Tech Mono,monospace'; ctx.textAlign = 'center';
    ctx.fillText('$'+livePrice.toFixed(2), pL+cW2+1+(pR-3)/2, ly+3);
  }

  // ── "1m" label top-left ──
  ctx.fillStyle = 'rgba(33,150,243,0.7)';
  ctx.fillRect(pL+2, pT+2, 22, 14);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Share Tech Mono,monospace'; ctx.textAlign = 'center';
  ctx.fillText('1m', pL+13, pT+11);
}

// ── Order book ────────────────────────────────────────────────
function updateOB(mid) {
  const rowsS=[], rowsB=[];
  const obSeed = Math.floor(Date.now() / 3000);
  const rng = makePRNG((obSeed * 1234567) >>> 0);
  for (let i=6; i>=1; i--) {
    const off = i*(0.003+rng()*0.005), sz = Math.floor(rng()*8000+500);
    rowsS.push({p:(mid+off).toFixed(3), sz:sz.toLocaleString(), w:Math.round(sz/8500*100)});
  }
  for (let i=1; i<=6; i++) {
    const off = i*(0.003+rng()*0.005), sz = Math.floor(rng()*8000+500);
    rowsB.push({p:(mid-off).toFixed(3), sz:sz.toLocaleString(), w:Math.round(sz/8500*100)});
  }
  document.getElementById('ob-s').innerHTML = rowsS.map(r=>`<div class="ob-r s"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`).join('');
  document.getElementById('ob-b').innerHTML = rowsB.map(r=>`<div class="ob-r b"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`).join('');
}

// ── UI update ─────────────────────────────────────────────────
let prevPrice = null;
function updateUI(lp) {
  const dayNum = getDayNum();
  const p = lp, fmt = p.toFixed(2);
  const isUp = prevPrice === null ? true : p >= prevPrice;

  const tb = document.getElementById('tb-p');
  tb.textContent = '$'+fmt;
  tb.className = 'tb-price '+(isUp?'up':'dn');
  setTimeout(() => tb.className = 'tb-price', 200);

  document.getElementById('st-p').textContent = '$'+fmt;

  const yestPrice = getDayPrice(Math.max(0, dayNum-1));
  const chg = p - yestPrice, pct = (chg/yestPrice*100).toFixed(2);
  document.getElementById('tb-chg').textContent = (chg>=0?'▲ +':'▼ ')+'$'+Math.abs(chg).toFixed(2)+' ('+pct+'%)';
  document.getElementById('tb-chg').style.color = chg>=0?'#00e676':'#ff3d57';
  document.getElementById('st-c').textContent = (chg>=0?'+':'')+pct+'%';
  document.getElementById('st-c').style.color  = chg>=0?'#00e676':'#ff3d57';

  document.getElementById('tb-hi').textContent = '$'+(p+0.45).toFixed(2);
  document.getElementById('tb-lo').textContent = '$'+Math.max(0.01,p-0.22).toFixed(2);

  const total = HOLDINGS * p;
  const balEl = document.getElementById('b-usd');
  balEl.textContent = '$'+total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  balEl.className = 'bc-total pulse';
  setTimeout(() => balEl.className = 'bc-total', 300);
  document.getElementById('b-sub').textContent = '@ $'+fmt+' per ONDO 2';
  document.getElementById('ob-m').textContent  = '$'+p.toFixed(4);
  document.getElementById('ob-m').style.color  = isUp?'#00e676':'#ff3d57';

  document.getElementById('cur-serial').textContent = 437 + dayNum * 89;
  updateOB(p);
}

// ── Main tick ─────────────────────────────────────────────────
function tick() {
  const dayNum  = getDayNum();
  const dayBase = getDayPrice(dayNum);
  const lp      = computeLivePrice(dayBase);

  advanceCandles(lp, dayBase);
  updateUI(lp);
  drawChart(lp);

  prevPrice = lp;
}

// ── Init ──────────────────────────────────────────────────────
seedCandles();
tick();
setInterval(tick, 1000);
window.addEventListener('resize', () => {
  const lp = computeLivePrice(getDayPrice(getDayNum()));
  drawChart(lp);
});
</script>
